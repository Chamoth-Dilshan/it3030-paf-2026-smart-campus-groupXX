spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=prod
spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}}
# Backward compatibility for libraries/configs still reading the old key.
spring.data.mongodb.uri=${spring.mongodb.uri}
server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET:change-this-development-secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.oauth.google-enabled=${APP_OAUTH_GOOGLE_ENABLED:false}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Email Infrastructure (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

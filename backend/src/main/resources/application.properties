spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=prod
spring.mongodb.uri=${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}}
# Backward compatibility for libraries/configs still reading the old key.
spring.data.mongodb.uri=${spring.mongodb.uri}
server.port=${SERVER_PORT:8080}
spring.data.mongodb.auto-index-creation=true

jwt.secret=${JWT_SECRET:change-this-development-secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.default-password=${APP_SEED_DEFAULT_PASSWORD:Password@123}
app.time-zone=${APP_TIME_ZONE:Asia/Colombo}
app.booking-expiry.fixed-delay-ms=${APP_BOOKING_EXPIRY_FIXED_DELAY_MS:60000}
app.booking-expiry.initial-delay-ms=${APP_BOOKING_EXPIRY_INITIAL_DELAY_MS:30000}

app.oauth.google-enabled=${APP_OAUTH_GOOGLE_ENABLED:false}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Email Infrastructure (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

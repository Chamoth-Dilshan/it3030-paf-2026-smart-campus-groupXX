spring.application.name=smart-campus-operations-hub

# Load backend/.env automatically for local development when present.
spring.config.import=optional:file:.env[.properties]

# MongoDB placeholder configuration.
# Replace with a real environment-driven value later, for example from backend/.env.example.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart-campus-db}

# Local frontend URL placeholder used by the starter CORS configuration.
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Google OAuth 2.0 placeholder configuration.
# These values are intentionally commented until real login flow is added.
# Expected environment variables:
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.client-id=your-client-id
# spring.security.oauth2.client.registration.google.client-secret=your-client-secret
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
